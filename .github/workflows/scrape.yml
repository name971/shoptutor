name: Scrape shops and events

# NOTE: trigger config below
on:
  schedule:
    # 12:00 JST = 03:00 UTC, every day
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape mtg-jp.com
        run: python scripts/scrape.py

      - name: Import into Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scripts/import.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shops.json events_weekly.json
          git diff --cached --quiet && exit 0

          git commit -m "chore: update scraped shop/event data"

          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt $i), rebasing onto latest master..."
            git fetch origin master
            git rebase origin/master
          done

          echo "push failed after retries"
          exit 1
